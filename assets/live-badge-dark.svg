<svg width="160" height="34" viewBox="0 0 160 34" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="160" height="34" rx="17" fill="#0d1117"/>
  <rect width="160" height="34" rx="17" fill="none" stroke="#30363d" stroke-width="1"/>

  <circle cx="22" cy="17" r="10" fill="#22c55e" fill-opacity="0" stroke="#22c55e" stroke-width="1.2">
    <animate attributeName="r" values="5;11;5" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    <animate attributeName="fill-opacity" values="0;0;0" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </circle>

  <circle cx="22" cy="17" r="5" fill="#22c55e" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    <animate attributeName="r" values="5;4.2;5" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </circle>

  <text x="38" y="22" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="12" font-weight="700" fill="#22c55e" letter-spacing="1.5">LIVE PROJECT</text>
</svg>
